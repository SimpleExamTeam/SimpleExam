basePath: /api/v1
definitions:
  admin.CreateCardRequest:
    properties:
      amount:
        type: number
      course_id:
        type: integer
      expire_days:
        type: integer
      total:
        type: integer
    required:
    - expire_days
    - total
    type: object
  admin.CreateCourseRequest:
    properties:
      category_level1:
        type: string
      category_level2:
        type: string
      category_sort1:
        type: integer
      category_sort2:
        type: integer
      cover:
        type: string
      description:
        type: string
      exam_config:
        items:
          $ref: '#/definitions/model.ExamConfigItem'
        type: array
      expire_days:
        type: integer
      mock_exam_config:
        $ref: '#/definitions/model.MockExamConfig'
      name:
        type: string
      price:
        type: number
      sort:
        type: integer
    required:
    - category_level1
    - category_level2
    - cover
    - name
    - price
    type: object
  admin.CreateOrderRequest:
    properties:
      amount:
        type: number
      course_id:
        type: integer
      user_id:
        type: integer
    required:
    - amount
    - course_id
    - user_id
    type: object
  admin.CreateUserRequest:
    properties:
      avatar:
        type: string
      city:
        type: string
      country:
        type: string
      is_admin:
        type: boolean
      nickname:
        type: string
      password:
        type: string
      province:
        type: string
      sex:
        type: integer
      username:
        type: string
    required:
    - nickname
    - password
    - username
    type: object
  admin.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  admin.QuestionRequest:
    properties:
      answer:
        type: string
      course_id:
        type: integer
      explanation:
        type: string
      options:
        items:
          $ref: '#/definitions/model.QuestionOption'
        type: array
      question:
        type: string
      type:
        type: string
    required:
    - answer
    - course_id
    - options
    - question
    - type
    type: object
  admin.UpdateCardRequest:
    properties:
      amount:
        type: number
      course_id:
        type: integer
      expire_days:
        type: integer
      total:
        type: integer
    type: object
  admin.UpdateCourseRequest:
    properties:
      category_level1:
        type: string
      category_level2:
        type: string
      category_sort1:
        type: integer
      category_sort2:
        type: integer
      cover:
        type: string
      description:
        type: string
      exam_config:
        items:
          $ref: '#/definitions/model.ExamConfigItem'
        type: array
      expire_days:
        type: integer
      mock_exam_config:
        $ref: '#/definitions/model.MockExamConfig'
      name:
        type: string
      price:
        type: number
      sort:
        type: integer
    type: object
  admin.UpdateFeedbackRequest:
    properties:
      reply_content:
        type: string
      status:
        type: integer
    type: object
  admin.UpdateOrderRequest:
    properties:
      amount:
        type: number
      expire_time:
        type: string
      pay_time:
        type: string
      payment_type:
        type: string
      status:
        type: string
    type: object
  admin.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      nickname:
        type: string
      password:
        type: string
      sex:
        type: integer
    type: object
  admin.UpdateUserRequest:
    properties:
      avatar:
        type: string
      city:
        type: string
      country:
        type: string
      is_admin:
        type: boolean
      nickname:
        type: string
      password:
        type: string
      province:
        type: string
      sex:
        type: integer
    type: object
  api.CreateFeedbackRequest:
    properties:
      feedback_content:
        type: string
    required:
    - feedback_content
    type: object
  api.CreatePaymentRequest:
    properties:
      course_id:
        type: string
      open_id:
        type: string
      total_fee:
        type: integer
    required:
    - course_id
    - open_id
    - total_fee
    type: object
  api.GenerateExplanationRequest:
    properties:
      force:
        type: boolean
    type: object
  api.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.RedeemCardRequest:
    properties:
      card_no:
        type: string
      course_id:
        type: integer
    required:
    - card_no
    - course_id
    type: object
  api.RefundRequest:
    properties:
      order_no:
        description: 订单号
        type: string
      refund_fee:
        description: 退款金额（元）
        type: number
      refund_reason:
        description: 退款原因
        type: string
    required:
    - order_no
    - refund_fee
    type: object
  api.RegisterRequest:
    properties:
      nickname:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - nickname
    - password
    - username
    type: object
  api.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      nickname:
        type: string
      open_id:
        type: string
    type: object
  api.WXLoginRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  api.WXUserInfoRequest:
    properties:
      userInfo:
        $ref: '#/definitions/service.WXUserInfo'
    required:
    - userInfo
    type: object
  model.ExamConfigItem:
    properties:
      count:
        type: integer
      score:
        type: integer
      type:
        type: string
    type: object
  model.MockExamConfig:
    properties:
      count:
        type: integer
      min:
        type: integer
      score:
        type: integer
    type: object
  model.QuestionOption:
    properties:
      label:
        type: string
      text:
        type: string
    type: object
  service.WXUserInfo:
    properties:
      avatarUrl:
        type: string
      city:
        type: string
      country:
        type: string
      gender:
        type: integer
      nickName:
        type: string
      openid:
        type: string
      province:
        type: string
      unionId:
        type: string
      watermark:
        properties:
          appid:
            type: string
          timestamp:
            type: integer
        type: object
    type: object
host: localhost:8080
info:
  contact:
    email: support@simpleexam.com
    name: SimpleExam Support
    url: https://github.com/SimpleExam
  description: 在线考试系统后端服务API文档
  license:
